<!DOCTYPE html>
<html lang="ko" class="scroll-smooth select-none">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>권준형 | 연락처 (Contact)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    ::selection { background-color: #ffffff; color: #111111; }
    .bg-dark-grid {
      background-size: 50px 50px;
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
    }
    .reveal { opacity: 0; transform: scale(0.98) translateY(20px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.active { opacity: 1; transform: scale(1) translateY(0); }
  </style>
</head>
<body class="bg-[#111111] text-white font-[-apple-system,BlinkMacSystemFont,sans-serif] antialiased">

  <header class="fixed top-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-[1100px] bg-black/40 backdrop-blur-xl border border-white/[0.05] rounded-2xl z-[1000]">
    <div class="flex justify-between items-center h-[64px] px-8">
      <a href="index.html" class="text-[0.9rem] font-bold tracking-[0.2em] no-underline text-white">JUNHYUNG</a>
      <nav class="flex gap-8">
        <a href="about.html" class="no-underline text-white/50 text-[0.8rem] font-medium tracking-wide hover:text-white">About</a>
        <a href="strengths.html" class="no-underline text-white/50 text-[0.8rem] font-medium tracking-wide hover:text-white">Strengths</a>
        <a href="contact.html" class="no-underline text-white text-[0.8rem] font-bold tracking-wide">Contact</a>
      </nav>
    </div>
  </header>

  <section id="cta" class="relative min-h-screen flex flex-col justify-center bg-[#111111] bg-dark-grid py-24 px-0 overflow-hidden">
    <div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-white/[0.02] rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[300px] h-[300px] bg-white/[0.01] rounded-full blur-[100px] pointer-events-none"></div>

    <div class="max-w-[680px] my-0 mx-auto px-8 w-full relative z-10 text-center reveal">
      <span class="text-[0.7rem] font-mono tracking-[0.3em] text-white/30 uppercase block mb-4">CONNECT</span>
      <h2 class="text-[2.25rem] md:text-[1.85rem] font-black mb-6 leading-[1.35] tracking-tight break-keep">
        함께 성장하고,<br>의미 있는 프로젝트를 만들어갈 동료를 기다립니다.
      </h2>
      <p class="text-[1.05rem] text-white/60 font-light tracking-wide mb-12 max-w-[500px] mx-auto break-keep">
        가벼운 커피챗이나 프로젝트 이야기도 언제든 환영합니다.
      </p>
      
      <div class="flex justify-center gap-4 sm:flex-col sm:items-stretch sm:max-w-[280px] sm:mx-auto">
        <a href="mailto:monxpronx@naver.com" class="inline-flex items-center justify-center px-8 py-3.8 text-[0.85rem] font-bold no-underline rounded-xl transition-all duration-400 cursor-pointer bg-white text-[#111111] border border-white hover:bg-[#f8f9fa] hover:-translate-y-0.5 hover:shadow-[0_20px_40px_rgba(255,255,255,0.1)]">
          이메일 보내기
        </a>
        <a href="#" onclick="showContactMessage(); return false;" class="inline-flex items-center justify-center px-8 py-3.8 text-[0.85rem] font-bold no-underline rounded-xl transition-all duration-400 cursor-pointer bg-white/[0.04] text-white border border-white/[0.08] hover:border-white/40 hover:bg-white/[0.08] hover:-translate-y-0.5">
          커피챗 신청하기
        </a>
      </div>
    </div>
  </section>

  <div id="toast-message" style="display: none;" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-[#111111] px-6 py-4 rounded-xl shadow-[0_30px_60px_rgba(0,0,0,0.5)] text-[0.85rem] font-bold z-[2000] transition-opacity duration-500 ease-in-out opacity-0 pointer-events-none tracking-wide">
    ☕ 커피챗 요청 알림이 전송되었습니다.
  </div>

  <footer class="bg-black py-12 text-center text-[0.75rem] text-white/30 tracking-widest relative z-10">
    <div class="max-w-[1100px] my-0 mx-auto px-8">
      <p>&copy; 2026 KWON JUNHYUNG. ALL RIGHTS RESERVED.</p>
    </div>
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    function showContactMessage() {
      const toast = document.getElementById('toast-message');
      if (toast.style.display === 'none') {
        toast.style.display = 'block';
        setTimeout(() => { toast.style.opacity = '1'; }, 10);
        setTimeout(() => {
          toast.style.opacity = '0';
          setTimeout(() => { toast.style.display = 'none'; }, 500);
        }, 4000);
      }
    }
  </script>
</body>
</html>
