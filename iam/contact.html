<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>권준형 | 연락처 (Contact)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f8f9fa] text-[#1a1a1a] font-[-apple-system,BlinkMacSystemFont,'Segoe_UI',Roboto,'Helvetica_Neue',Arial,sans-serif] line-height-[1.6] overflow-x-hidden">

  <header class="fixed top-0 left-0 w-full bg-[#f8f9fa]/90 backdrop-blur-[10px] border-b border-[#e5e5e5] z-[1000]">
    <div class="flex justify-between items-center h-[70px] max-w-[1000px] my-0 mx-auto px-6">
      <a href="index.html" class="text-[1.1rem] font-bold tracking-wider no-underline text-[#1a1a1a]">JUNHYUNG</a>
      <nav class="flex gap-8 md:gap-4">
        <a href="about.html" class="no-underline text-[#606060] text-[0.9rem] font-medium transition-colors duration-300 hover:text-[#1a1a1a]">About</a>
        <a href="strengths.html" class="no-underline text-[#606060] text-[0.9rem] font-medium transition-colors duration-300 hover:text-[#1a1a1a]">Strengths</a>
        <a href="contact.html" class="no-underline text-[#1a1a1a] text-[0.9rem] font-bold transition-colors duration-300">Contact</a>
      </nav>
    </div>
  </header>

  <section id="cta" class="min-h-screen pt-[140px] flex flex-col justify-center bg-[#2b2b2b] text-[#ffffff] text-center py-20 px-0">
    <div class="max-w-[600px] my-0 mx-auto px-6 w-full">
      <h2 class="text-[2rem] font-bold mb-4 leading-snug">함께 성장하고,<br>의미 있는 프로젝트를 만들어갈 동료를 기다립니다.</h2>
      <p class="text-[1.1rem] opacity-80 mb-8">가벼운 커피챗이나 프로젝트 이야기도 언제든 환영합니다.</p>
      
      <div class="flex justify-center gap-4 md:flex-col md:items-stretch md:max-w-[280px] md:my-0 md:mx-auto md:gap-3">
        <a href="mailto:monxpronx@naver.com" class="inline-flex items-center justify-center px-8 py-4 text-[0.95rem] font-semibold no-underline rounded-lg transition-all duration-300 ease-in-out cursor-pointer bg-[#ffffff] text-[#1a1a1a] border border-[#ffffff] hover:bg-[#f8f9fa] hover:-translate-y-0.5 hover:shadow-[0_4px_12px_rgba(0,0,0,0.1)]">이메일 보내기</a>
        <a href="#" onclick="showContactMessage(); return false;" class="inline-flex items-center justify-center px-8 py-4 text-[0.95rem] font-semibold no-underline rounded-lg transition-all duration-300 ease-in-out cursor-pointer bg-transparent text-[#ffffff] border border-[#ffffff] hover:bg-[#ffffff]/10 hover:-translate-y-0.5">커피챗 신청하기</a>
      </div>
    </div>
  </section>

  <div id="toast-message" style="display: none;" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#1a1a1a] text-[#ffffff] px-6 py-4 rounded-lg shadow-[0_4px_16px_rgba(0,0,0,0.2)] text-[0.95rem] font-medium z-[2000] transition-opacity duration-500 ease-in-out opacity-0 pointer-events-none">
    ☕ 커피챗 요청 알림이 전송되었습니다! 곧 연락드리겠습니다.
  </div>

  <footer class="bg-[#f8f9fa] border-t border-[#e5e5e5] py-10 px-0 text-center text-[0.85rem] text-[#606060]">
    <div class="max-w-[1000px] my-0 mx-auto px-6">
      <p class="mb-2">&copy; 2026 Kwon Junhyung. Built with pure HTML, CSS, and JS.</p>
      <p class="opacity-60 text-[0.8rem]">Designed for SSAFY Classmate Collaboration</p>
    </div>
  </footer>

  <script>
    function showContactMessage() {
      const toast = document.getElementById('toast-message');
      if (toast.style.display === 'none') {
        toast.style.display = 'block';
        setTimeout(() => { toast.style.opacity = '1'; }, 10);
        setTimeout(() => {
          toast.style.opacity = '0';
          setTimeout(() => { toast.style.display = 'none'; }, 500);
        }, 4000);
      }
    }
  </script>
</body>
</html>
